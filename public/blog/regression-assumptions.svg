<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#faf5ff"/>
  <text x="400" y="45" text-anchor="middle" fill="#3b0764" font-size="22" font-family="system-ui" font-weight="700">Assumptions of Multiple Regression</text>
  <rect x="40" y="75" width="220" height="130" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" fill="#4338ca" font-size="16" font-family="system-ui" font-weight="700">Linearity</text>
  <text x="150" y="130" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">Relationship between</text>
  <text x="150" y="148" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">predictors &amp; outcome</text>
  <text x="150" y="166" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">must be linear</text>
  <rect x="290" y="75" width="220" height="130" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" fill="#7e22ce" font-size="16" font-family="system-ui" font-weight="700">Independence</text>
  <text x="400" y="130" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">Observations must</text>
  <text x="400" y="148" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">be independent of</text>
  <text x="400" y="166" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">each other</text>
  <rect x="540" y="75" width="220" height="130" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="650" y="105" text-anchor="middle" fill="#4338ca" font-size="16" font-family="system-ui" font-weight="700">Homoscedasticity</text>
  <text x="650" y="130" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">Constant variance</text>
  <text x="650" y="148" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">of residuals across</text>
  <text x="650" y="166" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">predicted values</text>
  <rect x="165" y="230" width="220" height="130" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="2"/>
  <text x="275" y="260" text-anchor="middle" fill="#7e22ce" font-size="16" font-family="system-ui" font-weight="700">Normality</text>
  <text x="275" y="285" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">Residuals should be</text>
  <text x="275" y="303" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">approximately normally</text>
  <text x="275" y="321" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">distributed</text>
  <rect x="415" y="230" width="220" height="130" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="525" y="260" text-anchor="middle" fill="#4338ca" font-size="16" font-family="system-ui" font-weight="700">No Multicollinearity</text>
  <text x="525" y="285" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">Predictors should not</text>
  <text x="525" y="303" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">be highly correlated</text>
  <text x="525" y="321" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">with each other (VIF &lt; 5)</text>
</svg>
