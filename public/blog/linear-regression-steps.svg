<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="50" text-anchor="middle" fill="#e2e8f0" font-size="22" font-family="system-ui" font-weight="700">Step-by-Step: Computing the Regression Equation</text>
  <line x1="80" y1="90" x2="80" y2="350" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="80" cy="120" r="18" fill="#6366f1"/>
  <text x="80" y="125" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">1</text>
  <text x="120" y="125" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Calculate the Means</text>
  <text x="120" y="147" fill="#94a3b8" font-size="12" font-family="system-ui">Find x̄ = Σx/n and ȳ = Σy/n</text>
  <circle cx="80" cy="190" r="18" fill="#818cf8"/>
  <text x="80" y="195" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">2</text>
  <text x="120" y="195" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Compute Deviations</text>
  <text x="120" y="217" fill="#94a3b8" font-size="12" font-family="system-ui">Calculate (xi − x̄) and (yi − ȳ) for each point</text>
  <circle cx="80" cy="260" r="18" fill="#a855f7"/>
  <text x="80" y="265" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">3</text>
  <text x="120" y="265" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Find the Slope (m)</text>
  <text x="120" y="287" fill="#94a3b8" font-size="12" font-family="system-ui">m = Σ(xi−x̄)(yi−ȳ) / Σ(xi−x̄)²</text>
  <circle cx="80" cy="330" r="18" fill="#9333ea"/>
  <text x="80" y="335" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">4</text>
  <text x="120" y="335" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Calculate the Intercept (b)</text>
  <text x="120" y="357" fill="#94a3b8" font-size="12" font-family="system-ui">b = ȳ − m × x̄</text>
</svg>
