<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1e1b4b"/>
  <text x="400" y="50" text-anchor="middle" fill="#a5b4fc" font-size="22" font-family="system-ui" font-weight="700">Multiple Regression: Multiple Predictors</text>
  <line x1="80" y1="350" x2="720" y2="350" stroke="#64748b" stroke-width="1.5"/>
  <line x1="80" y1="70" x2="80" y2="350" stroke="#64748b" stroke-width="1.5"/>
  <text x="400" y="390" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui">Predictors</text>
  <text x="30" y="210" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui" transform="rotate(-90, 30, 210)">Response (y)</text>
  <circle cx="150" cy="300" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="200" cy="280" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="270" cy="250" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="330" cy="220" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="390" cy="200" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="450" cy="170" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="510" cy="150" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="570" cy="130" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="630" cy="110" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="680" cy="95" r="8" fill="#818cf8" opacity="0.8"/>
  <line x1="120" y1="310" x2="700" y2="90" stroke="#a855f7" stroke-width="3" opacity="0.6"/>
  <rect x="440" y="240" width="260" height="90" rx="12" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="570" y="270" text-anchor="middle" fill="#e0e7ff" font-size="15" font-family="monospace" font-weight="700">y = b₀ + b₁x₁ + b₂x₂</text>
  <text x="570" y="310" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui">Regression Plane Equation</text>
</svg>
