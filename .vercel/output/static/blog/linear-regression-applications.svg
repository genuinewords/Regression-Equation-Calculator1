<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#faf5ff"/>
  <text x="400" y="50" text-anchor="middle" fill="#3b0764" font-size="22" font-family="system-ui" font-weight="700">Real-World Applications of Linear Regression</text>
  <rect x="30" y="80" width="230" height="280" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="145" y="120" text-anchor="middle" fill="#4338ca" font-size="15" font-family="system-ui" font-weight="700">Business &amp; Finance</text>
  <text x="145" y="148" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">Predict revenue from</text>
  <text x="145" y="166" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">ad spend, forecast</text>
  <text x="145" y="184" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">stock trends, estimate</text>
  <text x="145" y="202" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">customer lifetime value</text>
  <rect x="285" y="80" width="230" height="280" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="400" y="120" text-anchor="middle" fill="#7e22ce" font-size="15" font-family="system-ui" font-weight="700">Healthcare &amp; Science</text>
  <text x="400" y="148" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">Predict patient recovery</text>
  <text x="400" y="166" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">time from dosage,</text>
  <text x="400" y="184" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">model temperature vs.</text>
  <text x="400" y="202" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">crop yield</text>
  <rect x="540" y="80" width="230" height="280" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="655" y="120" text-anchor="middle" fill="#4338ca" font-size="15" font-family="system-ui" font-weight="700">Social Sciences</text>
  <text x="655" y="148" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">Analyze study hours</text>
  <text x="655" y="166" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">vs. test scores, income</text>
  <text x="655" y="184" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">vs. education level,</text>
  <text x="655" y="202" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">crime rate vs. poverty</text>
</svg>
