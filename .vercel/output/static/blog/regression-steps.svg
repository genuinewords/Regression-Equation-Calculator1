<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0f172a"/>
  <text x="400" y="50" text-anchor="middle" fill="#e2e8f0" font-size="22" font-family="system-ui" font-weight="700">Step-by-Step: Building a Multiple Regression Model</text>
  <line x1="80" y1="90" x2="80" y2="360" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="80" cy="110" r="18" fill="#6366f1"/>
  <text x="80" y="115" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">1</text>
  <text x="120" y="115" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Define Your Research Question</text>
  <text x="120" y="137" fill="#94a3b8" font-size="12" font-family="system-ui">What are you trying to predict? Identify your dependent variable and candidate predictors.</text>
  <circle cx="80" cy="175" r="18" fill="#818cf8"/>
  <text x="80" y="180" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">2</text>
  <text x="120" y="180" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Collect &amp; Prepare Your Data</text>
  <text x="120" y="202" fill="#94a3b8" font-size="12" font-family="system-ui">Gather observations, handle missing values, check for outliers and data quality.</text>
  <circle cx="80" cy="240" r="18" fill="#a855f7"/>
  <text x="80" y="245" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">3</text>
  <text x="120" y="245" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Check Assumptions &amp; Explore</text>
  <text x="120" y="267" fill="#94a3b8" font-size="12" font-family="system-ui">Verify linearity, check correlations between predictors, assess multicollinearity (VIF).</text>
  <circle cx="80" cy="305" r="18" fill="#9333ea"/>
  <text x="80" y="310" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">4</text>
  <text x="120" y="310" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Fit the Model &amp; Interpret</text>
  <text x="120" y="332" fill="#94a3b8" font-size="12" font-family="system-ui">Run the regression, examine coefficients, p-values, and R². Validate with test data.</text>
  <circle cx="80" cy="355" r="18" fill="#6b21a8"/>
  <text x="80" y="360" text-anchor="middle" fill="#fff" font-size="14" font-family="system-ui" font-weight="700">5</text>
  <text x="120" y="360" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">Validate &amp; Refine</text>
  <text x="120" y="382" fill="#94a3b8" font-size="12" font-family="system-ui">Cross-validate, test residuals, remove insignificant predictors, and iterate.</text>
</svg>
